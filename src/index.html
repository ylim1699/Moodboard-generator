<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>moodboard-generator | Home</title>
    <script type="module" src="main.js"></script>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <div class="wrapper">
      <header class="main-header">
        
      </header>
      <main>
        <div class="login-container"> 
          <button class="login-page-btn" onclick="window.location.href='/login/index.html'">
            Log In
          </button>
          <button class="logout-btn hide">
            Log out
          </button>
        </div>

        <form class="search-form">
          <input type="text" id="search" name="search" placeholder="e.g. minimalist.." />
          <button class="search-button" type="submit">Search</button>
        </form>

        <form class="template-form">
          <label for="template-select">Choose Style:</label>
          <select id="template-select">
            <option value="#">Select</option>
            <option value="1">Grid 1</option>
            <option value="2">Grid 2</option>
            <option value="3">Grid 3</option>
          </select>
        </form>

        <div class="image-container hide defaultTemplate">
          
        </div>
      </main>
      <footer class="main-footer">
        
      </footer>
    </div>
  </body>
</html>
